<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Operations | MathLab Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../main/global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        .matrix-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
        }

        .matrix-table {
            border-collapse: separate;
            border-spacing: 8px;
        }

        .matrix-table input {
            width: 65px;
            text-align: center;
        }

        .matrix-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }

        .matrix-display td {
            padding: 10px 15px;
            border: 1px solid var(--glass-border);
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            font-family: monospace;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="../main/index.html" class="nav-logo">
            <i class="fas fa-square-root-variable"></i>
            MathLab Pro
        </a>
        <div class="nav-links">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="../index.html#tools" class="nav-link">Tools</a>
        </div>
    </nav>

    <div class="bg-glow"></div>

    <div class="container">
        <main class="main-card">
            <h1 class="section-title">Matrix Calculator</h1>
            <p class="section-subtitle">Precise linear algebra operations with real-time validation.</p>

            <form id="matrixForm">
                <div class="matrix-container">
                    <div id="m1-box">
                        <h3 style="color: var(--accent-color); text-align: center; margin-bottom: 15px;">Matrix A</h3>
                        <table id="matrix1" class="matrix-table">
                            <tr>
                                <td><input type="number" step="any" class="input-field" value="1"></td>
                                <td><input type="number" step="any" class="input-field" value="0"></td>
                            </tr>
                            <tr>
                                <td><input type="number" step="any" class="input-field" value="0"></td>
                                <td><input type="number" step="any" class="input-field" value="1"></td>
                            </tr>
                        </table>
                        <div class="matrix-actions">
                            <button type="button" class="btn-sm" onclick="addRow('matrix1')"><i class="fas fa-plus"></i>
                                R</button>
                            <button type="button" class="btn-sm" onclick="removeRow('matrix1')"><i
                                    class="fas fa-minus"></i> R</button>
                            <button type="button" class="btn-sm" onclick="addCol('matrix1')"><i class="fas fa-plus"></i>
                                C</button>
                            <button type="button" class="btn-sm" onclick="removeCol('matrix1')"><i
                                    class="fas fa-minus"></i> C</button>
                        </div>
                    </div>

                    <div id="m2-box">
                        <h3 style="color: var(--accent-color); text-align: center; margin-bottom: 15px;">Matrix B</h3>
                        <table id="matrix2" class="matrix-table">
                            <tr>
                                <td><input type="number" step="any" class="input-field" value="1"></td>
                                <td><input type="number" step="any" class="input-field" value="0"></td>
                            </tr>
                            <tr>
                                <td><input type="number" step="any" class="input-field" value="0"></td>
                                <td><input type="number" step="any" class="input-field" value="1"></td>
                            </tr>
                        </table>
                        <div class="matrix-actions">
                            <button type="button" class="btn-sm" onclick="addRow('matrix2')"><i class="fas fa-plus"></i>
                                R</button>
                            <button type="button" class="btn-sm" onclick="removeRow('matrix2')"><i
                                    class="fas fa-minus"></i> R</button>
                            <button type="button" class="btn-sm" onclick="addCol('matrix2')"><i class="fas fa-plus"></i>
                                C</button>
                            <button type="button" class="btn-sm" onclick="removeCol('matrix2')"><i
                                    class="fas fa-minus"></i> C</button>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="max-width: 400px; margin: 20px auto;">
                    <label class="form-label">Select Operation</label>
                    <select id="operation" class="input-field">
                        <option value="add">Addition (A + B)</option>
                        <option value="sub">Subtraction (A - B)</option>
                        <option value="mul">Multiplication (A × B)</option>
                        <option value="det">Determinant (of A)</option>
                        <option value="inv">Inverse (of A)</option>
                        <option value="trans">Transpose (of A)</option>
                    </select>
                </div>

                <button type="button" id="calcBtn" class="btn-gradient" style="width: 100%;" onclick="calculate()">
                    <i class="fas fa-calculator"></i> Compute Result
                </button>
            </form>

            <div id="resultCard" class="result-card">
                <h3 style="margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
                    Result</h3>
                <div id="resultOutput"></div>
            </div>
        </main>
    </div>

    <script>
        function addRow(id) {
            const table = document.getElementById(id);
            const row = table.insertRow();
            for (let i = 0; i < table.rows[0].cells.length; i++) {
                row.insertCell().innerHTML = '<input type="number" step="any" class="input-field" value="0">';
            }
        }
        function removeRow(id) {
            const table = document.getElementById(id);
            if (table.rows.length > 1) table.deleteRow(-1);
        }
        function addCol(id) {
            const table = document.getElementById(id);
            for (let i = 0; i < table.rows.length; i++) {
                table.rows[i].insertCell().innerHTML = '<input type="number" step="any" class="input-field" value="0">';
            }
        }
        function removeCol(id) {
            const table = document.getElementById(id);
            if (table.rows[0].cells.length > 1) {
                for (let i = 0; i < table.rows.length; i++) table.rows[i].deleteCell(-1);
            }
        }

        function getMatrixData(id) {
            const table = document.getElementById(id);
            const data = [];
            for (let i = 0; i < table.rows.length; i++) {
                const row = [];
                for (let j = 0; j < table.rows[i].cells.length; j++) {
                    row.push(parseFloat(table.rows[i].cells[j].querySelector('input').value) || 0);
                }
                data.push(row);
            }
            return data;
        }

        async function calculate() {
            const btn = document.getElementById('calcBtn');
            const output = document.getElementById('resultOutput');
            const card = document.getElementById('resultCard');
            const op = document.getElementById('operation').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calculating...';
            card.classList.remove('visible');

            await new Promise(r => setTimeout(r, 400));

            try {
                const A = getMatrixData('matrix1');
                let result;

                if (['add', 'sub', 'mul'].includes(op)) {
                    const B = getMatrixData('matrix2');
                    if (op === 'add') result = math.add(A, B);
                    else if (op === 'sub') result = math.subtract(A, B);
                    else if (op === 'mul') result = math.multiply(A, B);
                } else {
                    if (op === 'det') result = math.det(A);
                    else if (op === 'inv') result = math.inv(A);
                    else if (op === 'trans') result = math.transpose(A);
                }

                if (typeof result === 'number') {
                    output.innerHTML = `<div style="font-size: 2rem; font-weight: 700; color: var(--accent-color); text-align: center;">${math.format(result, { precision: 4 })}</div>`;
                } else {
                    let html = '<table class="matrix-display" style="margin: 0 auto;">';
                    const arr = math.isMatrix(result) ? result.toArray() : result;
                    arr.forEach(row => {
                        html += '<tr>' + row.map(v => `<td>${math.format(v, { precision: 4 })}</td>`).join('') + '</tr>';
                    });
                    html += '</table>';
                    output.innerHTML = html;
                }
                card.classList.add('visible');
            } catch (e) {
                output.innerHTML = `<div style="color: #ef4444; padding: 10px; border-radius: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);">${e.message}</div>`;
                card.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-calculator"></i> Compute Result';
            }
        }
    </script>
</body>

</html>
