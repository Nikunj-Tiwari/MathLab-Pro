<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Function Grapher | MathLab Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../main/global.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
  <style>
    #graph {
      width: 100%;
      height: 600px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.02);
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="../index.html" class="nav-link">Home</a>
    <a href="../index.html#tools" class="nav-link">Tools</a>
  </nav>

  <div class="bg-glow"></div>

  <div class="container" style="max-width: 1000px;">
    <main class="main-card">
      <h1 class="section-title">3D Function Visualizer</h1>
      <p class="section-subtitle">Accurate 3D surface rendering with robust mathematical parsing.</p>

      <form id="graphForm">
        <div class="form-group">
          <label class="form-label">Function f(x, y)</label>
          <input type="text" id="functionInput" class="input-field" placeholder="e.g. sin(x) * cos(y) or x^2 + y^2"
            value="sin(x) * cos(y)">
          <small style="color: var(--text-secondary); margin-top: 5px; display: block;">Supports: sin, cos, tan, exp,
            log, sqrt, abs, ^ (power), etc.</small>
        </div>

        <div class="controls-grid">
          <div class="form-group">
            <label class="form-label">X Min</label>
            <input type="number" id="xMin" class="input-field" value="-10" step="any">
          </div>
          <div class="form-group">
            <label class="form-label">X Max</label>
            <input type="number" id="xMax" class="input-field" value="10" step="any">
          </div>
          <div class="form-group">
            <label class="form-label">Y Min</label>
            <input type="number" id="yMin" class="input-field" value="-10" step="any">
          </div>
          <div class="form-group">
            <label class="form-label">Y Max</label>
            <input type="number" id="yMax" class="input-field" value="10" step="any">
          </div>
        </div>

        <button type="button" id="calcBtn" class="btn-gradient" style="width: 100%;" onclick="renderGraph()">
          <i class="fas fa-cube"></i> Generate 3D Plot
        </button>
      </form>

      <div id="resultCard" class="result-card">
        <div id="graph"></div>
      </div>
    </main>
  </div>

  <script>
    async function renderGraph() {
      const calcBtn = document.getElementById('calcBtn');
      const resultCard = document.getElementById('resultCard');
      const inputStr = document.getElementById('functionInput').value;
      const xMin = parseFloat(document.getElementById('xMin').value);
      const xMax = parseFloat(document.getElementById('xMax').value);
      const yMin = parseFloat(document.getElementById('yMin').value);
      const yMax = parseFloat(document.getElementById('yMax').value);

      // Validation
      if (isNaN(xMin) || isNaN(xMax) || isNaN(yMin) || isNaN(yMax)) {
        alert("Please enter valid numeric ranges.");
        return;
      }
      if (xMax <= xMin || yMax <= yMin) {
        alert("Max values must be greater than Min values.");
        return;
      }

      calcBtn.disabled = true;
      calcBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Rendering...';
      resultCard.classList.remove('visible');

      await new Promise(r => setTimeout(r, 400));

      try {
        // Use Math.js for robust parsing and evaluation
        const node = math.parse(inputStr);
        const code = node.compile();

        const steps = 50;
        const xValues = math.range(xMin, xMax, (xMax - xMin) / steps).toArray();
        const yValues = math.range(yMin, yMax, (yMax - yMin) / steps).toArray();
        const zValues = [];

        for (let i = 0; i < xValues.length; i++) {
          const row = [];
          for (let j = 0; j < yValues.length; j++) {
            try {
              const val = code.evaluate({ x: xValues[i], y: yValues[j] });
              row.push(val);
            } catch (e) { row.push(null); }
          }
          zValues.push(row);
        }

        const data = [{
          z: zValues,
          x: xValues,
          y: yValues,
          type: 'surface',
          colorscale: 'Portland',
          showscale: false
        }];

        const layout = {
          title: 'f(x, y) Surface Plot',
          autosize: true,
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)',
          font: { color: '#f8fafc', family: 'Poppins' },
          scene: {
            xaxis: { title: 'X', gridcolor: 'rgba(255,255,255,0.1)' },
            yaxis: { title: 'Y', gridcolor: 'rgba(255,255,255,0.1)' },
            zaxis: { title: 'f(x, y)', gridcolor: 'rgba(255,255,255,0.1)' },
            camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } }
          },
          margin: { l: 0, r: 0, b: 0, t: 40 }
        };

        Plotly.newPlot('graph', data, layout, { responsive: true });
        resultCard.classList.add('visible');
      } catch (error) {
        alert('Mathematical Error: ' + error.message);
      } finally {
        calcBtn.disabled = false;
        calcBtn.innerHTML = '<i class="fas fa-cube"></i> Generate 3D Plot';
      }
    }

    window.onload = renderGraph;
  </script>
</body>

</html>
