<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EG Solver | MathLab Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../main/global.css">
    <style>
        .eg-grid {
            display: grid;
            gap: 20px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .res-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .res-val {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .res-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="../../main/index.html" class="nav-logo">
            <i class="fas fa-square-root-variable"></i>
            MathLab Pro
        </a>
        <div class="nav-links">
            <a href="../../main/index.html" class="nav-link">Home</a>
            <a href="../../main/index.html#tools" class="nav-link">Tools</a>
        </div>
    </nav>
    <div class="bg-glow"></div>
    <div class="container" style="max-width: 600px;">
        <main class="main-card">
            <h1 class="section-title">Geometric Solver</h1>
            <p class="section-subtitle">Precision engineering calculations for planar geometric projections.</p>

            <form id="egForm" onsubmit="event.preventDefault(); solve();">
                <div class="form-group">
                    <label class="form-label">Geometric Shape</label>
                    <select id="shape" class="input-field" onchange="updateFields()">
                        <option value="triangle">Equilateral Triangle</option>
                        <option value="hexagon">Regular Hexagon</option>
                        <option value="pentagon">Regular Pentagon</option>
                        <option value="circle">Circle</option>
                    </select>
                </div>
                <div id="fields" class="eg-grid"></div>
                <button type="submit" id="btn" class="btn-gradient" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-pencil-ruler"></i> Calculate Metrics
                </button>
            </form>

            <div id="resultCard" class="result-card">
                <h3 style="margin-bottom: 15px;">Calculated Properties</h3>
                <div id="res" class="result-grid"></div>
            </div>
        </main>
    </div>
    <script>
        function updateFields() {
            const s = document.getElementById('shape').value;
            const f = document.getElementById('fields');
            f.innerHTML = '';
            if (s === 'circle') {
                f.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Diameter (mm)</label>
                        <input type="number" id="d" class="input-field" value="50" step="any">
                    </div>`;
            } else {
                f.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Side Length (mm)</label>
                        <input type="number" id="side" class="input-field" value="40" step="any">
                    </div>`;
            }
        }

        async function solve() {
            const s = document.getElementById('shape').value;
            const btn = document.getElementById('btn');
            const res = document.getElementById('res');
            const card = document.getElementById('resultCard');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            card.classList.remove('visible');

            await new Promise(r => setTimeout(r, 600));

            let area, perim, extraLabel = "Diagonal", extraVal = "-";

            if (s === 'triangle') {
                const side = parseFloat(document.getElementById('side').value);
                area = (Math.sqrt(3) / 4) * side * side;
                perim = 3 * side;
                extraLabel = "Altitude";
                extraVal = (Math.sqrt(3) / 2 * side).toFixed(2);
            } else if (s === 'hexagon') {
                const side = parseFloat(document.getElementById('side').value);
                area = (3 * Math.sqrt(3) / 2) * side * side;
                perim = 6 * side;
                extraVal = (2 * side).toFixed(2); // Long diagonal
            } else if (s === 'pentagon') {
                const side = parseFloat(document.getElementById('side').value);
                area = (1 / 4) * Math.sqrt(5 * (5 + 2 * Math.sqrt(5))) * side * side;
                perim = 5 * side;
                extraVal = (0.5 * (1 + Math.sqrt(5)) * side).toFixed(2); // Diagonal
            } else if (s === 'circle') {
                const dia = parseFloat(document.getElementById('d').value);
                const r = dia / 2;
                area = Math.PI * r * r;
                perim = 2 * Math.PI * r;
                extraLabel = "Radius";
                extraVal = r.toFixed(2);
            }

            res.innerHTML = `
                <div class="res-box"><div class="res-label">Area (mm²)</div><div class="res-val">${area.toFixed(2)}</div></div>
                <div class="res-box"><div class="res-label">Perimeter (mm)</div><div class="res-val">${perim.toFixed(2)}</div></div>
                <div class="res-box"><div class="res-label">${extraLabel}</div><div class="res-val">${extraVal}</div></div>
                <div class="res-box"><div class="res-label">Vertices</div><div class="res-val">${s === 'circle' ? '∞' : (s === 'triangle' ? 3 : (s === 'hexagon' ? 6 : 5))}</div></div>
            `;

            card.classList.add('visible');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-pencil-ruler"></i> Calculate Metrics';
        }
        window.onload = updateFields;
    </script>
</body>

</html>
