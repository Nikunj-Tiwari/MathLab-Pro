<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Path Finder for Airline Networks</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Shortest Path Finder for Airline Networks</h1>
    <div id="map"></div>
    <div id="controls">
        <label for="start">Select Start Airport:</label>
        <select id="start">
            <option value="New York">New York</option>
            <option value="Los Angeles">Los Angeles</option>
            <option value="London">London</option>
            <option value="Paris">Paris</option>
            <option value="Tokyo">Tokyo</option>
            <option value="Sydney">Sydney</option>
            <option value="Dubai">Dubai</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Shanghai">Shanghai</option>
            <option value="Singapore">Singapore</option>
            <option value="Cairo">Cairo</option>
            <option value="Rio de Janeiro">Rio de Janeiro</option>
            <option value="Buenos Aires">Buenos Aires</option>
            <option value="Delhi">Delhi</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Chennai">Chennai</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Hyderabad">Hyderabad</option>
        </select>
        
        <label for="end">Select End Airport:</label>
        <select id="end">
            <option value="New York">New York</option>
            <option value="Los Angeles">Los Angeles</option>
            <option value="London">London</option>
            <option value="Paris">Paris</option>
            <option value="Tokyo">Tokyo</option>
            <option value="Sydney">Sydney</option>
            <option value="Dubai">Dubai</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Shanghai">Shanghai</option>
            <option value="Singapore">Singapore</option>
            <option value="Cairo">Cairo</option>
            <option value="Rio de Janeiro">Rio de Janeiro</option>
            <option value="Buenos Aires">Buenos Aires</option>
            <option value="Delhi">Delhi</option>
            <option value="Kolkata">Kolkata</option>
            <option value="Chennai">Chennai</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Hyderabad">Hyderabad</option>
        </select>
        <button id="findPath">Find Shortest Path</button>
    </div>
    <div id="output"></div>
    <script src="script.js"></script>
</body>
</html>
