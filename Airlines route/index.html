<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Path Finder | MathLab Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../main/global.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
    <style>
        #map {
            width: 100%;
            height: 450px;
            margin-top: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            z-index: 1;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        #output {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="../main/index.html" class="nav-logo">
            <i class="fas fa-square-root-variable"></i>
            MathLab Pro
        </a>
        <div class="nav-links">
            <a href="../main/index.html" class="nav-link">Home</a>
            <a href="../main/index.html#tools" class="nav-link">Tools</a>
        </div>
    </nav>

    <div class="bg-glow"></div>

    <div class="container">
        <main class="main-card">
            <h1 class="section-title">Airline Network Path Finder</h1>
            <p class="section-subtitle">Find the most efficient route between global airport hubs using Dijkstra's
                algorithm.</p>

            <div class="controls-grid">
                <div class="form-group">
                    <label class="form-label">Departure Airport</label>
                    <select id="start" class="input-field">
                        <option value="New York">New York (JFK)</option>
                        <option value="London">London (LHR)</option>
                        <option value="Paris">Paris (CDG)</option>
                        <option value="Dubai">Dubai (DXB)</option>
                        <option value="Mumbai">Mumbai (BOM)</option>
                        <option value="Tokyo">Tokyo (HND)</option>
                        <option value="Sydney">Sydney (SYD)</option>
                        <option value="Singapore">Singapore (SIN)</option>
                        <option value="Los Angeles">Los Angeles (LAX)</option>
                        <option value="Delhi">Delhi (DEL)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Arrival Airport</label>
                    <select id="end" class="input-field">
                        <option value="Tokyo">Tokyo (HND)</option>
                        <option value="New York">New York (JFK)</option>
                        <option value="London">London (LHR)</option>
                        <option value="Paris">Paris (CDG)</option>
                        <option value="Dubai">Dubai (DXB)</option>
                        <option value="Mumbai">Mumbai (BOM)</option>
                        <option value="Sydney">Sydney (SYD)</option>
                        <option value="Singapore">Singapore (SIN)</option>
                        <option value="Los Angeles">Los Angeles (LAX)</option>
                        <option value="Delhi">Delhi (DEL)</option>
                    </select>
                </div>
            </div>

            <button id="findPath" class="btn-gradient" style="width: 100%;">
                <i class="fas fa-route"></i> Calculate Shortest Route
            </button>

            <div id="resultCard" class="result-card">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                    Optimized Route</h3>
                <div id="output"></div>
                <div id="map"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
