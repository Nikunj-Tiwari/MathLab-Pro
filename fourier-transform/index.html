<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Series | MathLab Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../main/global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        .formula-card {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 20px;
            border-radius: var(--radius-md);
            margin: 20px 0;
            text-align: center;
        }

        #plot {
            width: 100%;
            height: 450px;
            margin-top: 25px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .coef-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .coef-table th,
        .coef-table td {
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }

        .coef-table th {
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="../main/index.html" class="nav-logo">
            <i class="fas fa-square-root-variable"></i>
            MathLab Pro
        </a>
        <div class="nav-links">
            <a href="../index.html" class="nav-link">Home</a>
            <a href="../index.html#tools" class="nav-link">Tools</a>
        </div>
    </nav>

    <div class="bg-glow"></div>

    <div class="container">
        <main class="main-card">
            <h1 class="section-title">Fourier Series Analysis</h1>
            <p class="section-subtitle">Compute coefficients $a_n, b_n$ and visualize partial sum convergence.</p>

            <div class="formula-card">
                $$ f(x) = a_0 + \sum_{n=1}^\infty \left[ a_n \cos\left(\frac{2\pi n x}{T}\right) + b_n
                \sin\left(\frac{2\pi n x}{T}\right) \right] $$
            </div>

            <form id="fourierForm">
                <div class="form-group">
                    <label class="form-label">Function $f(x)$</label>
                    <input type="text" id="functionInput" class="input-field" value="x"
                        placeholder="e.g. x, x^2, sin(x)">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Period ($T$)</label>
                        <input type="number" id="periodInput" class="input-field" value="6.283" step="any">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total Terms ($N$)</label>
                        <input type="number" id="termsInput" class="input-field" value="5" min="1" max="50">
                    </div>
                </div>
                <button type="button" id="calcBtn" class="btn-gradient" style="width: 100%;" onclick="runAnalysis()">
                    <i class="fas fa-microscope"></i> Analyze Signal
                </button>
            </form>

            <div id="resultCard" class="result-card">
                <div id="resultsContent"></div>
                <div id="plot"></div>
            </div>
        </main>
    </div>

    <script>
        function integrate(fn, a, b, steps = 1000) {
            const h = (b - a) / steps;
            let sum = 0;
            // Use Simpson's Rule for better precision
            for (let i = 0; i <= steps; i++) {
                const x = a + i * h;
                const weight = (i === 0 || i === steps) ? 1 : (i % 2 === 1 ? 4 : 2);
                try {
                    const y = fn(x);
                    if (isNaN(y)) continue;
                    sum += weight * y;
                } catch (e) { }
            }
            return (h / 3) * sum;
        }

        async function runAnalysis() {
            const calcBtn = document.getElementById('calcBtn');
            const resultCard = document.getElementById('resultCard');
            const resultsContent = document.getElementById('resultsContent');
            const funcInput = document.getElementById('functionInput').value;
            const T = parseFloat(document.getElementById('periodInput').value);
            const N = parseInt(document.getElementById('termsInput').value);

            calcBtn.disabled = true;
            calcBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calculating Coefficients...';
            resultCard.classList.remove('visible');

            await new Promise(r => setTimeout(r, 600));

            try {
                const node = math.parse(funcInput);
                const code = node.compile();
                const f = (x) => code.evaluate({ x });

                const a0 = (1 / T) * integrate(f, -T / 2, T / 2);
                const coefficients = [];

                for (let n = 1; n <= N; n++) {
                    const an = (2 / T) * integrate(x => f(x) * Math.cos(2 * Math.PI * n * x / T), -T / 2, T / 2);
                    const bn = (2 / T) * integrate(x => f(x) * Math.sin(2 * Math.PI * n * x / T), -T / 2, T / 2);
                    coefficients.push({ n, an, bn });
                }

                // Render Results
                let html = `<h3>Coefficients</h3>
                           <p style="margin: 10px 0;">$a_0 = ${a0.toFixed(4)}$</p>
                           <div style="overflow-x: auto;">
                           <table class="coef-table">
                           <tr><th>$n$</th><th>$a_n$</th><th>$b_n$</th></tr>`;

                coefficients.forEach(c => {
                    html += `<tr><td>${c.n}</td><td>${c.an.toFixed(4)}</td><td>${c.bn.toFixed(4)}</td></tr>`;
                });
                html += `</table></div>`;
                resultsContent.innerHTML = html;

                // Plotting
                const xVals = math.range(-T, T, T / 100).toArray();
                const origY = xVals.map(x => { try { return f(x); } catch (e) { return null; } });
                const approxY = xVals.map(x => {
                    let sum = a0;
                    coefficients.forEach(c => {
                        sum += c.an * Math.cos(2 * Math.PI * c.n * x / T);
                        sum += c.bn * Math.sin(2 * Math.PI * c.n * x / T);
                    });
                    return sum;
                });

                const data = [
                    { x: xVals, y: origY, type: 'scatter', mode: 'lines', name: 'Original', line: { color: '#94a3b8', dash: 'dash' } },
                    { x: xVals, y: approxY, type: 'scatter', mode: 'lines', name: `N=${N} Approximation`, line: { color: '#3b82f6', width: 3 } }
                ];

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    font: { color: '#f8fafc', family: 'Poppins' },
                    margin: { t: 20, r: 20, b: 40, l: 40 },
                    xaxis: { gridcolor: 'rgba(255,255,255,0.1)', title: 'x' },
                    yaxis: { gridcolor: 'rgba(255,255,255,0.1)', title: 'y' }
                };

                Plotly.newPlot('plot', data, layout, { responsive: true });
                resultCard.classList.add('visible');
                if (window.MathJax) MathJax.typeset();

            } catch (error) {
                alert('Calculation Error: ' + error.message);
            } finally {
                calcBtn.disabled = false;
                calcBtn.innerHTML = '<i class="fas fa-microscope"></i> Analyze Signal';
            }
        }

        window.onload = runAnalysis;
    </script>
</body>

</html>
