<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maxima & Minima | MathLab Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../main/global.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
  <style>
    #graph {
      width: 100%;
      height: 450px;
      margin-top: 25px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      overflow: hidden;
    }

    .extrema-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
      justify-content: center;
    }

    .extrema-item {
      padding: 10px 15px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .type-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .max {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .min {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="../main/index.html" class="nav-logo">
      <i class="fas fa-square-root-variable"></i>
      MathLab Pro
    </a>
    <div class="nav-links">
      <a href="../main/index.html" class="nav-link">Home</a>
      <a href="../main/index.html#tools" class="nav-link">Tools</a>
    </div>
  </nav>
  <div class="bg-glow"></div>
  <div class="container">
    <main class="main-card">
      <h1 class="section-title">Global Extrema Finder</h1>
      <p class="section-subtitle">Identifies critical points and handles discontinuities (e.g., asymptotes).</p>
      <form id="calcForm">
        <div class="form-group">
          <label class="form-label">Function $f(x)$</label>
          <input type="text" id="func" class="input-field" value="tan(x)" placeholder="e.g. x^3 - 3x">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label class="form-label">X Min</label>
            <input type="number" id="xMin" class="input-field" value="-5" step="any">
          </div>
          <div class="form-group">
            <label class="form-label">X Max</label>
            <input type="number" id="xMax" class="input-field" value="5" step="any">
          </div>
        </div>
        <button type="button" id="calcBtn" class="btn-gradient" style="width: 100%;" onclick="analyze()">
          <i class="fas fa-search-location"></i> Analyze Function
        </button>
      </form>
      <div id="resultCard" class="result-card">
        <div id="extremaList" class="extrema-list"></div>
        <div id="graph"></div>
      </div>
    </main>
  </div>
  <script>
    async function analyze() {
      const btn = document.getElementById('calcBtn');
      const card = document.getElementById('resultCard');
      const list = document.getElementById('extremaList');
      const expr = document.getElementById('func').value;
      const xMin = parseFloat(document.getElementById('xMin').value);
      const xMax = parseFloat(document.getElementById('xMax').value);

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Finding Critical Points...';
      card.classList.remove('visible');
      await new Promise(r => setTimeout(r, 600));

      try {
        const node = math.parse(expr);
        const f = node.compile();
        const dNode = math.derivative(expr, 'x');
        const df = dNode.compile();

        const steps = 1000;
        const stepSize = (xMax - xMin) / steps;
        const traces = [];
        let currentTraceX = [];
        let currentTraceY = [];
        const extrema = [];

        for (let i = 0; i <= steps; i++) {
          const x = xMin + i * stepSize;
          try {
            const y = f.evaluate({ x });
            const isFinite = Math.abs(y) < 100; // Threshold for asymptotes

            if (isFinite) {
              currentTraceX.push(x);
              currentTraceY.push(y);
            } else {
              if (currentTraceX.length > 0) {
                traces.push({ x: currentTraceX, y: currentTraceY, mode: 'lines', line: { color: '#3b82f6' }, showlegend: false });
                currentTraceX = [];
                currentTraceY = [];
              }
            }

            // Check for extrema using derivative sign change
            if (i > 0 && i < steps) {
              const prevX = x - stepSize;
              const nextX = x + stepSize;
              const prevSlope = df.evaluate({ x: prevX });
              const currSlope = df.evaluate({ x });
              const nextSlope = df.evaluate({ x: nextX });

              if (prevSlope * currSlope <= 0 && Math.abs(currSlope) < 1) {
                const isMin = prevSlope < 0 && nextSlope > 0;
                const isMax = prevSlope > 0 && nextSlope < 0;
                if (isMin || isMax) {
                  extrema.push({ x, y, type: isMax ? 'Max' : 'Min' });
                }
              }
            }
          } catch (e) { }
        }

        if (currentTraceX.length > 0) {
          traces.push({ x: currentTraceX, y: currentTraceY, mode: 'lines', line: { color: '#3b82f6' }, showlegend: false });
        }

        const uniqueExtrema = [];
        extrema.forEach(e => {
          if (!uniqueExtrema.find(ue => Math.abs(ue.x - e.x) < stepSize * 5)) {
            uniqueExtrema.push(e);
          }
        });

        let listHtml = '';
        uniqueExtrema.forEach(e => {
          listHtml += `<div class="extrema-item">
                        <span class="type-label ${e.type === 'Max' ? 'max' : 'min'}">${e.type}</span>
                        <span>(${e.x.toFixed(2)}, ${e.y.toFixed(2)})</span>
                    </div>`;
        });
        list.innerHTML = listHtml || '<p style="color: var(--text-secondary);">No relative extrema found in range.</p>';

        if (uniqueExtrema.length > 0) {
          traces.push({
            x: uniqueExtrema.map(e => e.x),
            y: uniqueExtrema.map(e => e.y),
            mode: 'markers',
            marker: { color: '#ef4444', size: 10, symbol: 'diamond' },
            name: 'Extrema'
          });
        }

        const layout = {
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)',
          font: { color: '#f8fafc', family: 'Poppins' },
          margin: { t: 10, r: 10, b: 40, l: 40 },
          xaxis: { gridcolor: 'rgba(255,255,255,0.1)', range: [xMin, xMax] },
          yaxis: { gridcolor: 'rgba(255,255,255,0.1)', range: [-10, 10] }
        };

        Plotly.newPlot('graph', traces, layout, { responsive: true });
        card.classList.add('visible');
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-search-location"></i> Analyze Function';
      }
    }
    window.onload = analyze;
  </script>
</body>

</html>
